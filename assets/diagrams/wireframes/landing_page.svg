<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
    <!-- Background -->
    <rect width="1200" height="800" fill="#FFFFFF"/>
    
    <!-- Hero BG Shapes -->
    <circle cx="200" cy="200" r="300" fill="#E5E7EB" opacity="0.3"/>
    <circle cx="1000" cy="700" r="400" fill="#D1D5DB" opacity="0.2"/>

    <!-- Header -->
    <rect width="1200" height="80" fill="rgba(255,255,255,0.85)"/>
    <path d="M0 80 L1200 80" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="60" y="22" width="36" height="36" fill="#333" rx="8"/>
    <text x="110" y="48" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333">SIMKAB</text>
    
    <text x="650" y="45" font-family="sans-serif" font-size="15" font-weight="bold" fill="#666">Fitur Utama</text>
    <text x="750" y="45" font-family="sans-serif" font-size="15" font-weight="bold" fill="#666">Tim Pengembang</text>
    <text x="900" y="45" font-family="sans-serif" font-size="15" font-weight="bold" fill="#666">Karir</text>
    
    <rect x="980" y="22" width="160" height="36" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" rx="8"/>
    <text x="1040" y="45" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">Login</text>

    <!-- Hero Section -->
    <rect x="100" y="200" width="800" height="300" fill="none"/>
    <rect x="100" y="200" width="280" height="30" fill="none" stroke="#D1D5DB" stroke-width="1" rx="15"/>
    <text x="120" y="220" font-family="sans-serif" font-size="13" font-weight="bold" fill="#666">Platform Manajemen SDM Enterprise</text>
    
    <text x="100" y="280" font-family="sans-serif" font-size="64" font-weight="bold" fill="#333">Infrastruktur Digital</text>
    <text x="100" y="350" font-family="sans-serif" font-size="64" font-weight="bold" fill="#A0A0A0">Karyawan Bank</text>
    <text x="100" y="410" font-family="sans-serif" font-size="18" fill="#666">Solusi lengkap yang menyederhanakan absensi, payroll, dan evaluasi</text>
    <text x="100" y="435" font-family="sans-serif" font-size="18" fill="#666">kinerja dalam satu ekosistem terpadu berstandar keamanan tinggi.</text>
    
    <rect x="100" y="480" width="180" height="55" fill="#333" rx="12"/>
    <text x="140" y="513" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FFF">Akses Portal</text>
    
    <rect x="300" y="480" width="180" height="55" fill="#FFF" stroke="#D1D5DB" stroke-width="1" rx="12"/>
    <text x="340" y="513" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Pelajari Fitur</text>
</svg>